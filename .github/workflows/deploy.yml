# .github/workflows/deploy.yml

name: Deploy to VPS

# This action runs on every push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest # Use the latest Ubuntu runner from GitHub

    steps:
      # Step 1: Check out the repository code so the workflow can access it
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: SSH into the VPS and run the deployment script
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22 # Default SSH port is 22, change if you use a different one
          script: |
            # Navigate to the project directory
            cd ${{ secrets.PROJECT_PATH }}

            # Pull the latest changes from the main branch
            echo "🚚 Pulling latest changes..."
            git checkout main
            git pull origin main

            # Install/update dependencies
            echo "📦 Installing dependencies..."
            npm install

            # Build the Next.js application
            echo "🛠️ Building the application..."
            npm run build

            # Restart the application with PM2
            echo "🚀 Restarting the application..."
            # Note: Make sure 'xsave-nextjs' matches the name you gave your app in PM2.
            # You can check it with 'pm2 list' on your VPS.
            pm2 restart xsave-nextjs

            echo "✅ Deployment successful!"
